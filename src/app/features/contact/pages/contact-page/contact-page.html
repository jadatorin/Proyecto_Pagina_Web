<main>
  <section class="contact-hero">
    <span class="subtitle fade-in">Hablemos</span>
    <h1 class="fade-in-up stagger-1">Cont<span class="gold">áctanos</span></h1>
    <p class="fade-in-up stagger-2">Estamos listos para hacer realidad tu visión</p>
  </section>
  
  <section class="contact-content">
    <div class="contact-info fade-in-up stagger-3">
      <div class="info-item">
        <span class="label">Email</span>
        <a href="mailto:jadatorin&#64;yahoo.com">jadatorin&#64;yahoo.com</a>
      </div>
      <div class="info-item">
        <span class="label">Teléfono</span>
        <a href="tel:+584122087264">+58 412 2087264</a>
      </div>
      <div class="info-item">

    <form class="contact-form fade-in-up stagger-4">

      <div class="form-group">

        <label for="message">Mensaje</label>
